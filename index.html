<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RJPQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#262626', 
                        darkcard: '#303030', 
                        darkborder: '#404040', 
                        morandi: {
                            red: '#b07d7d', blue: '#6b8ba4', green: '#889e81', yellow: '#c2a37d'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { touch-action: manipulation; }
        button { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-darkbg text-gray-400 min-h-screen p-4 flex flex-col items-center font-sans overflow-x-hidden">

    <div class="flex flex-col gap-3">
        <div class="flex justify-between items-end px-1 pb-1">
            <h1 class="text-2xl font-bold text-white tracking-[0.2em]">RJPQ</h1>
            <div id="current-user-tag" class="px-3 py-1 rounded-full text-white font-bold shadow-md text-xs bg-morandi-red">101</div>
        </div>

        <div class="bg-darkcard border border-darkborder p-3 rounded-xl shadow-lg flex justify-center">
            <div class="grid grid-cols-4 gap-2">
                <button onclick="setUser('A')" class="py-2 px-4 md:px-5 bg-morandi-red text-white rounded font-bold text-sm">101</button>
                <button onclick="setUser('B')" class="py-2 px-4 md:px-5 bg-morandi-blue text-white rounded font-bold text-sm">102</button>
                <button onclick="setUser('C')" class="py-2 px-4 md:px-5 bg-morandi-green text-white rounded font-bold text-sm">103</button>
                <button onclick="setUser('D')" class="py-2 px-4 md:px-5 bg-morandi-yellow text-white rounded font-bold text-sm">104</button>
            </div>
        </div>

        <div id="grid-container" class="bg-darkcard border border-darkborder p-5 rounded-2xl shadow-2xl flex flex-col items-center"></div>

        <div class="bg-black/10 border border-darkborder p-3 rounded-xl flex flex-col gap-3 items-center shadow-inner w-full">
            <div class="flex flex-col items-center">
                <span class="text-[9px] text-gray-600 uppercase tracking-[0.3em] mb-1">My Sequence</span>
                <div id="password-display" class="text-xl md:text-2xl font-mono font-bold tracking-[0.2em] text-gray-400">_____ _____</div>
            </div>
            <div class="flex flex-col items-center border-t border-darkborder pt-2 w-full">
                <span class="text-[9px] text-indigo-400/70 uppercase tracking-[0.3em] mb-1 font-bold">Remainder</span>
                <div id="remainder-display" class="text-xl md:text-2xl font-mono font-bold tracking-[0.2em] text-indigo-300">_____ _____</div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 w-full">
            <button onclick="calculateRemainder()" class="py-3 bg-indigo-900/40 text-indigo-200 border border-indigo-700/50 rounded-lg hover:bg-indigo-800/60 transition text-[10px] font-bold tracking-[0.2em] shadow-lg">
                CALCULATE
            </button>
            <button onclick="clearAll()" class="py-3 bg-zinc-800 text-gray-400 border border-zinc-700 rounded-lg hover:bg-zinc-700 hover:text-white transition text-[10px] font-bold tracking-[0.2em]">
                CLEAR ALL
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYObSvoDFp4lv7NL1LazxjVsINtM-1DEI",
            databaseURL: "https://my-rjpq-default-rtdb.firebaseio.com",
            projectId: "my-rjpq",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const slotsRef = ref(db, 'slots');
        const clearRef = ref(db, 'lastClear');

        const users = {
            A: { name: '101', color: 'bg-morandi-red' },
            B: { name: '102', color: 'bg-morandi-blue' },
            C: { name: '103', color: 'bg-morandi-green' },
            D: { name: '104', color: 'bg-morandi-yellow' }
        };

        let currentUser = 'A';
        let localMarks = JSON.parse(localStorage.getItem('rjpq_marks') || '{"A":[],"B":[],"C":[],"D":[]}');
        let myLastClear = localStorage.getItem('rjpq_last_clear_time') || "0";
        let lastCloudData = {};

        window.calculateRemainder = () => {
            const result = [];
            for (let l = 1; l <= 10; l++) {
                const occupied = [];
                for (let s = 1; s <= 4; s++) {
                    if (lastCloudData && lastCloudData[`slot-${l}-${s}`]) occupied.push(s);
                }
                if (occupied.length === 3) {
                    const remain = [1, 2, 3, 4].find(n => !occupied.includes(n));
                    result.push(remain);
                } else {
                    result.push("_");
                }
            }
            const display = document.getElementById('remainder-display');
            display.innerText = `${result.slice(0, 5).join('')} ${result.slice(5, 10).join('')}`;
            display.classList.add('animate-pulse');
            setTimeout(() => display.classList.remove('animate-pulse'), 1000);
        };

        onValue(clearRef, (snapshot) => {
            const cloudTime = snapshot.val();
            if (cloudTime && String(cloudTime) !== myLastClear) {
                localMarks = {"A":[],"B":[],"C":[],"D":[]};
                myLastClear = String(cloudTime);
                localStorage.setItem('rjpq_marks', JSON.stringify(localMarks));
                localStorage.setItem('rjpq_last_clear_time', myLastClear);
                document.getElementById('remainder-display').innerText = "_____ _____";
                refreshUI();
            }
        });

        const container = document.getElementById('grid-container');
        for (let l = 10; l >= 1; l--) {
            const row = document.createElement('div');
            row.className = 'flex items-center gap-1.5 md:gap-2 mb-1.5'; 
            const label = document.createElement('div');
            label.className = 'w-10 h-10 flex items-center justify-center text-gray-500 font-bold border border-darkborder rounded-lg bg-black/10 text-sm shrink-0';
            label.innerText = l;
            row.appendChild(label);

            const group = document.createElement('div');
            group.className = 'flex flex-row gap-1.5 md:gap-2';
            for (let s = 1; s <= 4; s++) {
                const btn = document.createElement('button');
                const sid = `slot-${l}-${s}`;
                btn.id = sid;
                btn.className = 'w-16 h-10 md:w-20 md:h-10 border border-darkborder rounded-lg flex items-center justify-center font-bold text-gray-500 bg-darkcard transition-all text-base relative overflow-hidden';
                btn.innerText = s;

                let lastTap = 0, tapT, sX = 0, sY = 0, scrolling = false;
                btn.addEventListener('touchstart', (e) => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; scrolling = false; }, { passive: true });
                btn.addEventListener('touchmove', (e) => { 
                    if (Math.abs(e.touches[0].clientX - sX) > 10 || Math.abs(e.touches[0].clientY - sY) > 10) { scrolling = true; clearTimeout(tapT); }
                }, { passive: true });
                btn.addEventListener('touchend', (e) => {
                    if (scrolling) return;
                    const now = new Date().getTime();
                    const len = now - lastTap;
                    clearTimeout(tapT);
                    if (len < 300 && len > 0) { toggleMark(sid); if (navigator.vibrate) navigator.vibrate(50); lastTap = 0; }
                    else { tapT = setTimeout(() => { toggleSlot(l, s); lastTap = 0; }, 250); }
                    lastTap = now;
                    if (e.cancelable) e.preventDefault();
                }, false);

                btn.onclick = (e) => { if (e.pointerType === 'mouse') toggleSlot(l, s); };
                btn.oncontextmenu = (e) => { e.preventDefault(); if (e.pointerType === 'mouse') toggleMark(sid); };
                group.appendChild(btn);
            }
            row.appendChild(group);
            container.appendChild(row);
        }

        async function toggleSlot(level, slot) {
            const sid = `slot-${level}-${slot}`;
            const data = lastCloudData || {};
            
            if (data[sid] === currentUser) {
                await set(ref(db, `slots/${sid}`), null);
            } 
  
            else if (!data[sid]) {
                for (let i = 1; i <= 4; i++) {
                    if (data[`slot-${level}-${i}`] === currentUser) {
                        await set(ref(db, `slots/slot-${level}-${i}`), null);
                    }
                }
                await set(ref(db, `slots/${sid}`), currentUser);
                
                localMarks[currentUser] = localMarks[currentUser].filter(id => !id.startsWith(`slot-${level}-`));
                localStorage.setItem('rjpq_marks', JSON.stringify(localMarks));
                
  
                updateDisplay(lastCloudData);
            }
        }

        function toggleMark(sid) {
            const marks = localMarks[currentUser];
            const idx = marks.indexOf(sid);
            if (idx > -1) marks.splice(idx, 1);
            else marks.push(sid);
            localStorage.setItem('rjpq_marks', JSON.stringify(localMarks));
            updateDisplay(lastCloudData);
        }

        function updateDisplay(data) {
            lastCloudData = data || {}; 
            let myPass = [];
            const marks = localMarks[currentUser];
            document.querySelectorAll('button[id^="slot-"]').forEach(btn => {
                const sid = btn.id;
                const num = sid.split('-')[2];
                btn.className = 'w-16 h-10 md:w-20 md:h-10 border border-darkborder rounded-lg flex items-center justify-center font-bold text-gray-500 bg-darkcard transition-all text-base relative';
                btn.innerHTML = num;
                if (data && data[sid]) {
                    btn.classList.add(users[data[sid]].color, 'text-white', 'border-transparent');
                } else if (marks.includes(sid)) {
                    btn.classList.add('border-red-900/50');
                    btn.innerHTML = `<span class="text-red-500 absolute inset-0 flex items-center justify-center text-2xl">×</span><span class="opacity-20">${num}</span>`;
                }
            });
            for (let l = 1; l <= 10; l++) {
                let c = "_";
                for (let s = 1; s <= 4; s++) if (data && data[`slot-${l}-${s}`] === currentUser) c = s;
                myPass.push(c);
            }
            document.getElementById('password-display').innerText = `${myPass.slice(0, 5).join('')} ${myPass.slice(5, 10).join('')}`;
        }

        onValue(slotsRef, (snap) => updateDisplay(snap.val()));

        window.setUser = (u) => { 
            currentUser = u; 
            document.getElementById('current-user-tag').innerText = users[u].name;
            document.getElementById('current-user-tag').className = `px-3 py-1 rounded-full text-white font-bold shadow-md text-xs ${users[u].color}`;
            updateDisplay(lastCloudData);
            document.getElementById('remainder-display').innerText = "_____ _____"; 
        };
        
        window.clearAll = async () => {
            const now = Date.now().toString();
            await set(slotsRef, null);
            await set(clearRef, now); 
            localMarks = {"A":[],"B":[],"C":[],"D":[]};
            myLastClear = now;
            localStorage.setItem('rjpq_marks', JSON.stringify(localMarks));
            localStorage.setItem('rjpq_last_clear_time', myLastClear);
            document.getElementById('remainder-display').innerText = "_____ _____";
        };

        window.refreshUI = async () => {
            const snap = await get(slotsRef);
            updateDisplay(snap.val());
        };

        setUser('A');
    </script>
</body>
</html>
